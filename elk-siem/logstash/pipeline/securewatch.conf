input {
  file {
    path => "/logs/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "cloudtrail"
    tags => ["aws", "cloudtrail"]
  }

  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "application"
    tags => ["medicare", "application"]
  }

  tcp {
    port => 5044
    codec => json_lines
    type => "realtime"
    tags => ["realtime"]
  }
}

filter {

  if [type] == "cloudtrail" {

    if [Records] {
      split {
        field => "Records"
      }
    }

    mutate {
      rename => {
        "[Records][eventTime]"       => "event_time"
        "[Records][eventName]"       => "event_name"
        "[Records][eventSource]"     => "event_source"
        "[Records][sourceIPAddress]" => "source_ip"
        "[Records][userAgent]"       => "user_agent"
        "[Records][awsRegion]"       => "aws_region"
        "[Records][errorCode]"       => "error_code"
        "[Records][errorMessage]"    => "error_message"
      }
    }

    if [event_name] in ["ConsoleLogin", "GetSecretValue", "DeleteTrail", "StopLogging", "CreateUser", "AttachUserPolicy"] {
      mutate {
        add_tag => ["suspicious", "high-priority"]
        add_field => { "alert_reason" => "Sensitive AWS API call detected: %{event_name}" }
      }
    }

    if [error_code] == "AccessDenied" or [error_code] == "UnauthorizedOperation" {
      mutate {
        add_tag => ["access-denied", "potential-attack"]
        add_field => { "alert_reason" => "Access denied - possible privilege escalation attempt" }
      }
    }

    if [userIdentity][type] == "Root" {
      mutate {
        add_tag => ["root-usage", "critical"]
        add_field => { "alert_reason" => "CRITICAL: Root account used - immediate investigation required" }
      }
    }

  }

  if [type] == "application" {

    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}"
      }
    }

    if [log_message] =~ /UNION|SELECT|DROP|INSERT|UPDATE|DELETE/ {
      mutate {
        add_tag => ["sql-injection", "attack-detected"]
        add_field => {
          "alert_reason" => "SQL injection pattern detected in application log"
          "severity"     => "HIGH"
          "mitre_tactic" => "T1190 - Exploit Public-Facing Application"
        }
      }
    }

    if [log_message] =~ /\.\.[\/\\]/ {
      mutate {
        add_tag => ["path-traversal", "attack-detected"]
        add_field => {
          "alert_reason" => "Path traversal attempt detected"
          "severity"     => "HIGH"
          "mitre_tactic" => "T1083 - File and Directory Discovery"
        }
      }
    }

    if [log_message] =~ /cmd|whoami|passwd|shadow/ {
      mutate {
        add_tag => ["command-injection", "attack-detected"]
        add_field => {
          "alert_reason" => "Command injection pattern detected"
          "severity"     => "CRITICAL"
          "mitre_tactic" => "T1059 - Command and Scripting Interpreter"
        }
      }
    }

  }

  mutate {
    add_field => {
      "project"     => "SecureWatch"
      "environment" => "dev"
      "compliance"  => "NHS-DSP-Toolkit"
    }
  }

}

output {

  if [type] == "cloudtrail" {
    elasticsearch {
      hosts    => ["http://elasticsearch:9200"]
      user     => "elastic"
      password => "SecureWatch2024!"
      index    => "securewatch-cloudtrail-%{+YYYY.MM.dd}"
    }
  }

  else if [type] == "application" {
    elasticsearch {
      hosts    => ["http://elasticsearch:9200"]
      user     => "elastic"
      password => "SecureWatch2024!"
      index    => "securewatch-medicare-%{+YYYY.MM.dd}"
    }
  }

  else {
    elasticsearch {
      hosts    => ["http://elasticsearch:9200"]
      user     => "elastic"
      password => "SecureWatch2024!"
      index    => "securewatch-general-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }

}
