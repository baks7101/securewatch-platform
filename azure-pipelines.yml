trigger:
  - master

pool:
  name: Default

stages:

  - stage: SecretScanning
    displayName: "Stage 1 - Secret Scanning (Gitleaks)"
    pool:
      name: Default
    jobs:
      - job: GitleaksScan
        displayName: "Scan for hardcoded secrets"
        pool:
          name: Default
        steps:
          - checkout: self

          - script: |
              echo "Installing Gitleaks..."
              curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_darwin_arm64.tar.gz -o gitleaks.tar.gz
              tar -xzf gitleaks.tar.gz
              chmod +x gitleaks
              echo "Running Gitleaks secret scan..."
              ./gitleaks detect --source . --report-format json --report-path gitleaks-report.json --exit-code 0 || true
              echo "Scan complete"
            displayName: "Run Gitleaks"

          - script: |
              python3 parse-gitleaks.py
            displayName: "Display secrets found"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: gitleaks-report.json
              artifactName: secret-scan-results
            displayName: "Save Gitleaks report"


  - stage: StaticCodeAnalysis
    displayName: "Stage 2 - SAST (Semgrep)"
    dependsOn: SecretScanning
    pool:
      name: Default
    jobs:
      - job: SemgrepScan
        displayName: "Scan for vulnerable code patterns"
        pool:
          name: Default
        steps:
          - checkout: self

          - script: |
              pip3 install semgrep
              which semgrep
              semgrep --version
            displayName: "Install Semgrep"

          - script: |
              echo "Running Semgrep SAST scan..."
              semgrep scan \
                --config=p/python \
                --config=p/sql-injection \
                --config=p/command-injection \
                --config=p/owasp-top-ten \
                --json \
                --output semgrep-report.json \
                ./vulnerable-app/app.py || true
              echo "Exit code: $?"
              ls -la semgrep-report.json || echo "Report file not found"
              echo "Semgrep scan complete"
            displayName: "Run Semgrep"

          - script: |
              python3 parse-semgrep.py
            displayName: "Display vulnerabilities found"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: semgrep-report.json
              artifactName: sast-results
            displayName: "Save Semgrep report"


  - stage: DependencyScanning
    displayName: "Stage 3 - SCA (Trivy)"
    dependsOn: StaticCodeAnalysis
    pool:
      name: Default
    jobs:
      - job: TrivyScan
        displayName: "Scan for vulnerable dependencies"
        pool:
          name: Default
        steps:
          - checkout: self

          - script: |
              echo "Installing Trivy..."
              curl -sSL https://github.com/aquasecurity/trivy/releases/download/v0.48.0/trivy_0.48.0_macOS-ARM64.tar.gz -o trivy.tar.gz
              tar -xzf trivy.tar.gz
              chmod +x trivy
              echo "Trivy installed"
            displayName: "Install Trivy"

          - script: |
              echo "Running Trivy dependency scan..."
              echo "Current directory:"
              pwd
              echo "Files here:"
              ls -la
              ./trivy fs \
                --scanners vuln \
                --format json \
                --output trivy-report.json \
                ./vulnerable-app/requirements.txt
              echo "Exit code: $?"
              echo "Checking for report:"
              ls -la trivy-report.json || echo "Report not found"
            displayName: "Run Trivy"

          - script: |
              echo "=== CVEs FOUND ==="
              python3 parse-trivy.py
            displayName: "Display CVEs found"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: trivy-report.json
              artifactName: dependency-scan-results
            displayName: "Save Trivy report"


  - stage: SecurityGate
    displayName: "Stage 4 - Security Gate"
    dependsOn:
      - SecretScanning
      - StaticCodeAnalysis
      - DependencyScanning
    pool:
      name: Default
    jobs:
      - job: SecurityGateCheck
        displayName: "Evaluate security scan results"
        pool:
          name: Default
        steps:
          - download: current
            artifact: secret-scan-results

          - download: current
            artifact: sast-results

          - download: current
            artifact: dependency-scan-results

          - script: |
              python3 security-gate.py
            env:
              PIPELINE_WORKSPACE: $(Pipeline.Workspace)
            displayName: "Security Gate Summary"